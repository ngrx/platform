name: Collect Docs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install --global corepack@0.31.0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm exec nx run-many -t build --exclude=www --skip-nx-cache --parallel=3
      - run: pnpm exec nx run www:collect-docs --skip-nx-cache
      - name: Create or update pull request for updated API reference docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          BRANCH="chore/update-api-reference-docs"
          BASE_BRANCH="main"
          TITLE="docs: update API reference"

          git checkout -B "$BRANCH"
          git add projects/www/src/app/reference/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update API reference [skip ci]"
          git push --force-with-lease --set-upstream origin "$BRANCH"

          PR_BODY=$'This PR was automatically generated by the collect-docs workflow.\n\nIt updates API reference JSON files under `projects/www/src/app/reference/`.'

          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$PR_BODY"
          else
            gh pr create --base "$BASE_BRANCH" --head "$BRANCH" --title "$TITLE" --body "$PR_BODY"
          fi
